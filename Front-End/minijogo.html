<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VORTEX | Protocolo de Treinamento</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #050506; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* HEADER DO JOGO */
        .game-header {
            width: 100%;
            padding: 20px 50px;
            display: none; /* Escondido no login */
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            z-index: 5;
            box-sizing: border-box;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .nav-link:hover { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* TELA DE LOGIN */
        #login-screen {
            position: absolute;
            background: rgba(0,0,0,0.95);
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #player-name {
            background: #000;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            width: 280px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }
        .btn-sessao {
            background: transparent;
            color: white;
            border: 2px solid var(--purple);
            padding: 15px 40px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-sessao:hover { background: var(--purple); color: black; box-shadow: 0 0 20px var(--purple); }

        /* AREA DO JOGO */
        .main-game-container {
            display: flex;
            align-items: flex-start;
            margin-top: 100px;
        }
        .game-border {
            border: 5px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
            background: #000;
            line-height: 0;
        }
        .ranking-box {
            margin-left: 30px;
            border: 1px solid var(--purple);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            width: 220px;
            font-family: 'JetBrains Mono', monospace;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            border-bottom: 1px dashed #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="binary-rain" id="binary"></div>

    <header id="game-nav" class="game-header">
        <div style="color: white; font-family: 'JetBrains Mono'; font-weight: bold;">VORTEX</div>
        <a href="index.html" class="nav-link">VOLTAR</a>
    </header>
    
    <div id="login-screen">
        <h1 class="glitch" style="color: var(--cyan); font-size: 3rem; margin-bottom: 10px;">IDENTIFIQUE-SE</h1>
        <input type="text" id="player-name" placeholder="NOME_DO_USUARIO" maxlength="15">
        <button onclick="startGame()" class="btn-sessao">INICIAR_SESSÃO</button>
    </div>

    <main class="main-game-container">
        <div style="text-align: center;">
            <div class="game-border">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>
            <div style="margin-top: 20px; color: var(--cyan); font-family: 'JetBrains Mono'; font-size: 1.2rem;">
                SCORE: <span id="scoreVal">000</span>
            </div>
        </div>

        <div class="ranking-box">
            <h3 style="color: var(--cyan); font-size: 14px; margin-bottom: 15px; text-align: center;">[ TOP_RANKING ]</h3>
            <div id="ranking-list"></div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const box = 20;
        
        let snake, food, score, d, gameInterval, playerName;

        let leaderboard = JSON.parse(localStorage.getItem("vortex_rank")) || [
            {name: "CYBER_GHOST", score: 142},
            {name: "NEO_DEV", score: 89}
        ];

        function updateLeaderboard() {
            const list = document.getElementById("ranking-list");
            leaderboard.sort((a, b) => b.score - a.score);
            list.innerHTML = leaderboard.slice(0, 10).map((player, index) => `
                <div class="ranking-item">
                    <span>${index + 1}. ${player.name}</span>
                    <span style="color: var(--cyan);">${player.score.toString().padStart(3, '0')}</span>
                </div>
            `).join('');
            localStorage.setItem("vortex_rank", JSON.stringify(leaderboard));
        }

        function startGame() {
            playerName = document.getElementById("player-name").value.trim().toUpperCase();
            if(!playerName) return alert("INSIRA UM CODINOME!");
            
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-nav").style.display = "flex"; // Mostra o Voltar
            resetGame();
        }

        function resetGame() {
            // Spawn centralizado para evitar colisão imediata
            snake = [{x: 10 * box, y: 10 * box}]; 
            generateFood();
            score = 0;
            d = null;
            scoreElement.innerHTML = "000";
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(draw, 100);
            updateLeaderboard();
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * 20) * box,
                y: Math.floor(Math.random() * 20) * box
            };
            // Checa se comida nasceu na cobra
            if(snake.some(cell => cell.x === food.x && cell.y === food.y)) generateFood();
        }

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
            if(e.keyCode == 38 && d != "DOWN") d = "UP";
            if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
            if(e.keyCode == 40 && d != "UP") d = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cobra sólida
            snake.forEach((cell, i) => {
                ctx.fillStyle = (i === 0) ? "#00f2ff" : "#bc13fe";
                ctx.fillRect(cell.x, cell.y, box, box);
            });

            // Comida
            ctx.fillStyle = "#fff";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d === "LEFT") snakeX -= box;
            if(d === "UP") snakeY -= box;
            if(d === "RIGHT") snakeX += box;
            if(d === "DOWN") snakeY += box;

            // Lógica de colisão corrigida
            if (d) {
                if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || 
                    snake.some((cell, index) => index !== 0 && cell.x === snakeX && cell.y === snakeY)) {
                    gameOver();
                    return;
                }

                if (snakeX === food.x && snakeY === food.y) {
                    score++;
                    scoreElement.innerHTML = score.toString().padStart(3, '0');
                    generateFood();
                } else {
                    snake.pop();
                }

                snake.unshift({x: snakeX, y: snakeY});
            }
        }

        function gameOver() {
            clearInterval(gameInterval);
            let pIdx = leaderboard.findIndex(p => p.name === playerName);
            if(pIdx !== -1) {
                if(score > leaderboard[pIdx].score) leaderboard[pIdx].score = score;
            } else {
                leaderboard.push({name: playerName, score: score});
            }
            updateLeaderboard();
            alert("PERDEU, PLAYBOY! SCORE: " + score);
            
            // Volta para o login
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("game-nav").style.display = "none";
        }

        updateLeaderboard();
    </script>
</body>
</html>
