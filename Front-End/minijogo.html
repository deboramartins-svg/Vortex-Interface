<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VORTEX | Protocolo de Treinamento</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --green: #05f3ff;
        }

        body { 
            margin: 0; 
            background: #0d0d0d; 
            color: white;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #login-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .glitch-title {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--cyan);
            text-shadow: 4px 4px var(--purple);
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        #player-name {
            background: transparent;
            border: 2px solid var(--cyan);
            color: white; /* Mudei para white para facilitar a leitura */
            padding: 15px;
            width: 400px;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            outline: none;
            text-transform: uppercase;
        }

        .btn-iniciar {
            background: transparent;
            border: 2px solid var(--purple);
            color: white;
            padding: 15px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-iniciar:hover { background: var(--purple); box-shadow: 0 0 20px var(--purple); }

        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .btn-comecar {
            background: var(--green);
            color: black;
            border: 2px solid black;
            padding: 10px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        canvas {
            background: black; /* COR DO ESPAÇO DO JOGO */
            border: 5px solid var(--green);
            box-shadow: 0 0 25px rgba(3, 17, 121, 0.692);
        }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 15px;
        }

        #ranking-side {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--purple);
            padding: 15px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="glitch-title">IDENTIFIQUE-SE</div>
        <input type="text" id="player-name" placeholder="NOME_DO_USUARIO" maxlength="15">
        <button class="btn-iniciar" onclick="entrarNoSistema()">INICIAR_SESSÃO</button>
    </div>

    <div id="game-container">
        <button class="btn-comecar" id="start-btn" onclick="startGame()">Começar Jogo</button>
        <canvas id="gameCanvas" width="510" height="510"></canvas>
        <div class="score-display">Pontos: <span id="scoreVal">0</span></div>
    </div>

    <div id="ranking-side" style="display:none">
        <h4 style="color:var(--cyan); margin:0 0 10px 0">TOP_RANKING</h4>
        <div id="rank-list"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        
        // TAMANHO DO QUADRADINHO
        let box = 15; 
        
        let snake, direction, food, score, gameLoop, playerName;
        let ranking = JSON.parse(localStorage.getItem("vortex_rank")) || [];

        function entrarNoSistema() {
            playerName = document.getElementById("player-name").value.trim().toUpperCase();
            if(!playerName) return alert("INSIRA SEU NOME!");
            
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            document.getElementById("ranking-side").style.display = "block";
            updateRankUI();
        }

        function startGame() {
            snake = [{x: 10 * box, y: 10 * box}];
            direction = "RIGHT";
            score = 0;
            scoreElement.innerText = "0";
            generateFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
            document.getElementById("start-btn").blur();
        }

        function generateFood() {
            // Garante que a comida nasça alinhada ao grid do box
            food = {
                x: Math.floor(Math.random() * (canvas.width / box)) * box,
                y: Math.floor(Math.random() * (canvas.height / box)) * box
            };
        }

        document.addEventListener("keydown", e => {
            if(e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
            if(e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
            if(e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
            if(e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
        });

        function draw() {
            // COR DO ESPAÇO (FUNDO)
            ctx.fillStyle = "black"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // COR DA COMIDA
            ctx.fillStyle = "#BF94E4"; 
            ctx.fillRect(food.x, food.y, box, box);

            // DESENHO DA COBRA COM EFEITO DE RASTRO
for(let i = 0; i < snake.length; i++) {
    if (i === 0) {
        // Cor da Cabeça (Sólida)
        ctx.fillStyle = "#BF94E4"; 
    } else {
        // Efeito de Transparência Gradual
        // Cálculo: quanto maior o 'i', menor a opacidade
        let opacidade = 1 - (i / snake.length);
        if (opacidade < 0.2) opacidade = 0.2; // Não deixa sumir totalmente
        
        ctx.fillStyle = `rgba(131, 111, 255, ${opacidade})`; 
    }
    
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
}

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(direction === "LEFT") snakeX -= box;
            if(direction === "UP") snakeY -= box;
            if(direction === "RIGHT") snakeX += box;
            if(direction === "DOWN") snakeY += box;

            if(snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }

            let newHead = {x: snakeX, y: snakeY};

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameLoop);
                salvarScore();
                alert("FIM DE JOGO! Score: " + score);
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x === array[i].x && head.y === array[i].y) return true;
            }
            return false;
        }

        function salvarScore() {
            ranking.push({name: playerName, pts: score});
            ranking.sort((a,b) => b.pts - a.pts);
            ranking = ranking.slice(0, 5);
            localStorage.setItem("vortex_rank", JSON.stringify(ranking));
            updateRankUI();
        }

        function updateRankUI() {
            const list = document.getElementById("rank-list");
            list.innerHTML = ranking.map((r, i) => `<div>${i+1}. ${r.name} - ${r.pts}</div>`).join('');
        }
    </script>
</body>
</html>
